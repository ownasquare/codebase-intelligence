name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first. The core workflow is add a repository, Ask, and open cited Source.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is difficult today, and who experiences it?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the simplest successful user experience.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any workflow or extension seam you already tried.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Add or index a repository
        - Ask and retrieval
        - Source citations
        - Language support
        - Provider support
        - API
        - Operations or security
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this change.
