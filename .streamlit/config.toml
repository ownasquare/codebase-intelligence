[theme]
base = "light"
primaryColor = "#0F766E"
backgroundColor = "#F6F7F9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#172033"
linkColor = "#0F766E"
borderColor = "#D9DEE7"
showWidgetBorder = true
baseRadius = "medium"
buttonRadius = "medium"
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"

[server]
headless = true
runOnSave = true
maxUploadSize = 100
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode = "viewer"
